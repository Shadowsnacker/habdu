<!DOCTYPE html>
<!--  Habdu [Habits N'To-do's: A data-heavy project to work with numbers and dates -->
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Habdu - Your Habit Tracker</title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/habits.css">
        <link rel="stylesheet" href="css/clock.css">
    </head>
    <body>
        <!-- Navigation Sidebar (left side) -->
         <nav class="sidebar">
            <div class="nav-item active" data-view="habits">
                <div class="nav-icon">☑</div>
                <div class="nav-label">Habits</div>
            </div>
            <div class="nav-item" data-view="clock">
                <div class="nav-icon">🕐</div>
                <div class="nav-label">Clock</div>
            </div>
        </nav>
        <!-- Main Content Area (RIGHT SIDE) -->
        <main class="content">
            <!-- Habits View -->
            <section id="habits-view" class="view active">
                <div class="container">
                    <header>
                        <h1>Habdu</h1>
                        <p class="tagline">Checking off habits and to-do's, one day at a time</p>
                    </header>
                    <section class="habit-input-section">
                        <h2>Add a New Habit</h2>
                        <input
                            type="text"
                            id="habitInput"
                            placeholder="E.g., Drink 8 glasses of water"
                            maxlength="50">
                        <button id="addHabitBtn">Add Habit</button>
                    </section>
                    <section class="habits-display-section">
                        <h2>Your Habits</h2>
                        <div id="habitsContainer">
                            <p class="empty-state">No habits yet. Add your first one above!</p>
                        </div>
                    </section>
                </div>
            </section>
            <!-- Clock View (placeholder) -->
            <section id="clock-view" class="view">
                <canvas id="clockCanvas" width="600" height="600"></canvas>
                <div id="dataControls">
                    <button id="viewData">View Stored Data</button>
                    <button id="clearData">Clear All Data</button>
                </div>
                <div id="settingsPanel">
                    <button id="closePanel">×</button>
                    <h2>Edit Activity</h2>
                    <div class="form-group">
                        <label for="activityLabel">Activity Name</label>
                        <input type="text" id="activityLabel" placeholder="e.g., Deep Work">
                    </div>
                    <div class="form-group">
                        <label>Start Time</label>
                        <div class="time-inputs">
                            <input type="number" id="startHour" min="0" max="23" placeholder="Hour (0-23)">
                            <input type="number" id="startMin" min="0" max="59" placeholder="Min (0-59)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Duration</label>
                        <div class="time-inputs">
                            <input type="number" id="durationHours" min="0" max="24" placeholder="Hours">
                            <input type="number" id="durationMin" min="0" max="59" placeholder="Minutes">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="activityColor">Color</label>
                        <div class="color-picker-container">
                            <input type="color" id="activityColor">
                            <span id="colorHex">#3498DB</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Icon</label>
                        <div class="icon-selector" id="iconSelector">
                            <div class="icon-option" data-icon="🌙">🌙</div>
                            <div class="icon-option" data-icon="☕">☕</div>
                            <div class="icon-option" data-icon="💼">💼</div>
                            <div class="icon-option" data-icon="🍔">🍔</div>
                            <div class="icon-option" data-icon="⚡">⚡</div>
                            <div class="icon-option" data-icon="🏋️">🏋️</div>
                            <div class="icon-option" data-icon="🎮">🎮</div>
                            <div class="icon-option" data-icon="📚">📚</div>
                            <div class="icon-option" data-icon="🎨">🎨</div>
                            <div class="icon-option" data-icon="🚗">🚗</div>
                            <div class="icon-option" data-icon="✈️">✈️</div>
                            <div class="icon-option" data-icon="🎵">🎵</div>
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn-save" id="saveActivity">Save</button>
                        <button class="btn-delete" id="deleteActivity">Delete</button>
                        <button class="btn-cancel" id="cancelEdit">Cancel</button>
                    </div>
                </div>
            </section>
        </main>
        <script src="js/app.js"></script>
    </body>
</html>
